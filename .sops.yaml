# sops recipient config. Two keys can decrypt secrets/:
#   remco  — editing key at ~/.config/sops/age/keys.txt (BACK THIS UP,
#            e.g. into 1Password: lose it and you re-create every secret)
#   kyurem — the host's SSH key (ssh-to-age of ssh_host_ed25519_key.pub);
#            what sops-nix decrypts with at system activation
# New host: add its ssh-to-age recipient here, then run
#   sops updatekeys secrets/secrets.yaml
keys:
  - &remco age1cjuj4p3tphqqdgph3er4h4e6xks9lgrmtjy55vd9serr9zz3xdgssvwr0l
  - &kyurem age1e27hs4ykn0udescjwnk7prc7gwu3ua4cn3mztyafx932m5h8jcqqduz7va

creation_rules:
  - path_regex: secrets/.*\.yaml$
    key_groups:
      - age:
          - *remco
          - *kyurem
